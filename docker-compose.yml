services:
  client:
    build: ./client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
      - VITE_SOCKET_URL=http://localhost:5000
    depends_on:
      - server

  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - SERVER_PORT=5000
      - CLIENT_URL=http://localhost:5173
      - JWT_SECRET=change_this_secret
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_PASSWORD=admin123